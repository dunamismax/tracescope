[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
ignore = [
    # Transitive through wgpu/metal on macOS via eframe; no maintained replacement is currently
    # selectable from this workspace without changing the UI stack.
    "RUSTSEC-2024-0436",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OFL-1.1",
    "Unicode-3.0",
    "Ubuntu-font-1.0",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
